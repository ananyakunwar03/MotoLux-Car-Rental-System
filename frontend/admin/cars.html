<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Cars - Rento Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="shortcut icon" href="../assests/favicon.ico">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <nav class="admin-nav" style="justify-content: flex-start; padding: 20px;">
        <a href="/frontend/admin/dashboard.html" class="back-link"><i class="fa fa-arrow-left"></i> Back to
            Dashboard</a>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </nav>
    <script>
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = '/frontend/admin/login.html';
        });
    </script>
    <section class="admin-manage">
        <h1>Manage Cars</h1>
        <p>View, add, edit, or delete cars.</p>
        <div class="admin-form">
            <h2>Add/Edit Car</h2>
            <form id="carForm">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Brand</label>
                    <input type="text" id="brand" required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="type" required>
                        <option value="two-seater">Two-Seater</option>
                        <option value="five-seater">Five-Seater</option>
                        <option value="seven-seater">Seven-Seater</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Transmission</label>
                    <select id="transmission" required>
                        <option value="Manual">Manual</option>
                        <option value="Automatic">Automatic</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Seater</label>
                    <input type="number" id="seater" required>
                </div>
                <div class="form-group">
                    <label>Price Per Day</label>
                    <input type="number" id="pricePerDay" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="image" required>
                </div>
                <button type="submit" class="btn-submit">Save Car</button>
            </form>
        </div>
        <table class="admin-table" id="carsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Type</th>
                    <th>Price/Day</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="message-container"></div>
    </section>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        const messageContainer = document.getElementById('message-container');
        let editingCarId = null; // Track if editing

        async function loadCars() {
            try {
                messageContainer.innerHTML = '<p>Loading cars...</p>';
                const res = await fetch('http://localhost:5000/api/admin/cars', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to load cars');
                const cars = await res.json();
                const tbody = document.querySelector('#carsTable tbody');
                tbody.innerHTML = cars.map(c => `
                    <tr>
                        <td><input value="${c.name || ''}" id="name-${c._id}"></td>
                        <td><input value="${c.brand || ''}" id="brand-${c._id}"></td>
                        <td><select id="type-${c._id}">
                            <option value="two-seater" ${c.type === 'two-seater' ? 'selected' : ''}>Two-Seater</option>
                            <option value="five-seater" ${c.type === 'five-seater' ? 'selected' : ''}>Five-Seater</option>
                            <option value="seven-seater" ${c.type === 'seven-seater' ? 'selected' : ''}>Seven-Seater</option>
                        </select></td>
                        <td><input type="number" value="${c.pricePerDay || ''}" id="price-${c._id}"></td>
                        <td>
                            <button class="btn-update" onclick="updateCar('${c._id}')">Update</button>
                            <button class="btn-delete" onclick="deleteCar('${c._id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
                messageContainer.innerHTML = '';
            } catch (error) {
                console.error('Error loading cars:', error);
                messageContainer.innerHTML = '<div class="error-message">Error loading cars. Please try again.</div>';
            }
        }

        document.getElementById('carForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value.trim(),
                brand: document.getElementById('brand').value.trim(),
                type: document.getElementById('type').value,
                transmission: document.getElementById('transmission').value,
                seater: parseInt(document.getElementById('seater').value),
                pricePerDay: parseInt(document.getElementById('pricePerDay').value),
                image: document.getElementById('image').value.trim()
            };
            if (!data.name || !data.brand) {
                alert('Name and brand are required.');
                return;
            }
            try {
                const method = editingCarId ? 'PUT' : 'POST';
                const url = editingCarId ? `http://localhost:5000/api/admin/cars/${editingCarId}` : 'http://localhost:5000/api/admin/cars';
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Failed to save car');
                loadCars();
                document.getElementById('carForm').reset();
                editingCarId = null;
                messageContainer.innerHTML = '<div class="success-message">Car saved successfully.</div>';
                setTimeout(() => messageContainer.innerHTML = '', 3000);
            } catch (error) {
                console.error('Error saving car:', error);
                messageContainer.innerHTML = '<div class="error-message">Error saving car. Please try again.</div>';
            }
        });

        async function updateCar(id) {
            const data = {
                name: document.getElementById(`name-${id}`).value.trim(),
                brand: document.getElementById(`brand-${id}`).value.trim(),
                type: document.getElementById(`type-${id}`).value,
                pricePerDay: parseInt(document.getElementById(`price-${id}`).value)
            };
            if (!data.name || !data.brand) {
                alert('Name and brand are required.');
                return;
            }
            try {
                const res = await fetch(`http://localhost:5000/api/admin/cars/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Failed to update car');
                loadCars();
                messageContainer.innerHTML = '<div class="success-message">Car updated successfully.</div>';
                setTimeout(() => messageContainer.innerHTML = '', 3000);
            } catch (error) {
                console.error('Error updating car:', error);
                messageContainer.innerHTML = '<div class="error-message">Error updating car. Please try again.</div>';
            }
        }

        async function deleteCar(id) {
            if (!confirm('Are you sure you want to delete this car?')) return;
            try {
                const res = await fetch(`http://localhost:5000/api/admin/cars/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to delete car');
                loadCars();
                messageContainer.innerHTML = '<div class="success-message">Car deleted successfully.</div>';
                setTimeout(() => messageContainer.innerHTML = '', 3000);
            } catch (error) {
                console.error('Error deleting car:', error);
                messageContainer.innerHTML = '<div class="error-message">Error deleting car. Please try again.</div>';
            }
        }

        loadCars();
    </script>
</body>

</html>
