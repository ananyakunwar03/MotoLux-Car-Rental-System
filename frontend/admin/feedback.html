<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Feedback - Rento Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="shortcut icon" href="../assests/favicon.ico">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <nav class="admin-nav" style="justify-content: flex-start; padding: 20px;">
        <a href="/frontend/admin/dashboard.html" class="back-link"><i class="fa fa-arrow-left"></i> Back to
            Dashboard</a>
        <button class="logout-btn" id="logout-btn">Logout</button>
        <script>
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('adminToken');
                window.location.href = '/frontend/admin/login.html';
            });
        </script>
    </nav>
    
    <section class="admin-manage">
        <h1>Manage Feedback</h1>
        <p>View and delete user feedback.</p>
        <table class="admin-table" id="feedbackTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Car Model</th>
                    <th>Overall Exp</th>
                    <th>Submitted At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="message-container"></div>
    </section>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        const messageContainer = document.getElementById('message-container');

        async function loadFeedback() {
            try {
                messageContainer.innerHTML = '<p>Loading feedback...</p>';
                const res = await fetch('http://localhost:5000/api/admin/feedback', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to load feedback');
                const feedback = await res.json();
                const tbody = document.querySelector('#feedbackTable tbody');
                tbody.innerHTML = feedback.map(f => `
                    <tr>
                        <td>${f.name || 'N/A'}</td>
                        <td>${f.email || 'N/A'}</td>
                        <td>${f.carModel || 'N/A'}</td>
                        <td>${f.overallExp || 'N/A'}</td>
                        <td>${new Date(f.submittedAt).toLocaleDateString()}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteFeedback('${f._id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
                messageContainer.innerHTML = '';
            } catch (error) {
                console.error('Error loading feedback:', error);
                messageContainer.innerHTML = '<div class="error-message">Error loading feedback. Please try again.</div>';
            }
        }

        async function deleteFeedback(id) {
            if (!confirm('Are you sure you want to delete this feedback?')) return;
            try {
                const res = await fetch(`http://localhost:5000/api/admin/feedback/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to delete feedback');
                loadFeedback();
                messageContainer.innerHTML = '<div class="success-message">Feedback deleted successfully.</div>';
                setTimeout(() => messageContainer.innerHTML = '', 3000);
            } catch (error) {
                console.error('Error deleting feedback:', error);
                messageContainer.innerHTML = '<div class="error-message">Error deleting feedback. Please try again.</div>';
            }
        }

        loadFeedback();
    </script>
</body>

</html>
