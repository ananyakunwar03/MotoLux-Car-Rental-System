<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rento | Admin Login</title>
    <meta name="description" content="Admin login for Rento car rental system.">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="shortcut icon" href="../assests/favicon.ico">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <section class="admin-login-section">
        <div class="admin-login-container">
            <h2>Admin Login</h2>
            <p>Access the admin panel</p>
            <form id="loginForm">
                <div class="input-box">
                    <i class="fa fa-envelope"></i>
                    <input id="email" type="email" placeholder="Email Address" required>
                </div>
                <div class="input-box">
                    <i class="fa fa-lock"></i>
                    <input id="password" type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="admin-login-btn">Log In</button>
            </form>
            <div id="message-container"></div>
        </div>
    </section>

<script>
    if (localStorage.getItem("adminToken")) {
        window.location.href = "dashboard.html";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const msg = document.getElementById("message-container");

        msg.innerHTML = "Checking credentials...";

        try {
            const response = await fetch("http://localhost:5000/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            console.log("response status:", response.status);
            console.log("data:", data);

            if (response.ok && data.user.isAdmin) {
                localStorage.setItem("adminToken", data.token);
                window.location.href = "dashboard.html";

            } else if (response.ok && !data.user.isAdmin) {
                msg.innerHTML = `<div class="error-message">Access denied: You are not an admin</div>`;

            } else {
                msg.innerHTML = `<div class="error-message">${data.message}</div>`;
            }

        } catch (error) {
            msg.innerHTML = `<div class="error-message">Network error.</div>`;
        }
    });
</script>

</body>
</html>
