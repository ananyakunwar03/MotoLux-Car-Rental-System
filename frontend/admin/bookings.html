<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Bookings - Rento Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="shortcut icon" href="../assests/favicon.ico">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <nav class="admin-nav" style="justify-content: flex-start; padding: 20px;">
        <a href="/frontend/admin/dashboard.html" class="back-link"><i class="fa fa-arrow-left"></i> Back to
            Dashboard</a>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </nav>
    <section class="admin-manage">
        <h1>Manage Bookings</h1>
        <p>View and update booking statuses.</p>
        <table class="admin-table" id="bookingsTable">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Car</th>
                    <th>Pickup Location</th>
                    <th>Pickup Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="message-container"></div>
    </section>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        const messageContainer = document.getElementById('message-container');

        async function loadBookings() {
            try {
                messageContainer.innerHTML = '<p>Loading bookings...</p>';
                const res = await fetch('http://localhost:5000/api/admin/bookings', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to load bookings');
                const bookings = await res.json();
                const tbody = document.querySelector('#bookingsTable tbody');
                tbody.innerHTML = bookings.map(b => `
                    <tr>
                        <td>${b.user?.name || 'N/A'} (${b.user?.email || 'N/A'})</td>
                        <td>${b.car?.name || 'N/A'}</td>
                        <td>${b.pickupLocation || 'N/A'}</td>
                        <td>${new Date(b.pickupDate).toLocaleDateString()}</td>
                        <td><select id="status-${b._id}">
                            <option value="pending" ${b.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="confirmed" ${b.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                            <option value="cancelled" ${b.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select></td>
                        <td>
                            <button class="btn-update" onclick="updateBooking('${b._id}')">Update</button>
                        </td>
                    </tr>
                `).join('');
                messageContainer.innerHTML = '';
            } catch (error) {
                console.error('Error loading bookings:', error);
                messageContainer.innerHTML = '<div class="error-message">Error loading bookings. Please try again.</div>';
            }
        }

        async function updateBooking(id) {
            const status = document.getElementById(`status-${id}`).value;
            try {
                const res = await fetch(`http://localhost:5000/api/admin/bookings/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ status })
                });
                if (!res.ok) throw new Error('Failed to update booking');
                loadBookings();
                messageContainer.innerHTML = '<div class="success-message">Booking updated successfully.</div>';
                setTimeout(() => messageContainer.innerHTML = '', 3000);
            } catch (error) {
                console.error('Error updating booking:', error);
                messageContainer.innerHTML = '<div class="error-message">Error updating booking. Please try again.</div>';
            }
        }

        loadBookings();
    </script>
</body>
</html>
