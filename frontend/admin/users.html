<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Users - Rento Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="shortcut icon" href="../assests/favicon.ico">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <nav class="admin-nav" style="justify-content: flex-start; padding: 20px;">
        <a href="/frontend/admin/dashboard.html" class="back-link"><i class="fa fa-arrow-left"></i> Back to
            Dashboard</a>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </nav>
<script>
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = '/frontend/admin/login.html';
        });
    </script>
</nav>

    <section class="admin-manage">
        <h1>Manage Users</h1>
        <p>View, edit, or delete user accounts.</p>
        <table class="admin-table" id="usersTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Admin</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="message-container"></div>
    </section>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        const messageContainer = document.getElementById('message-container');

        async function loadUsers() {
            try {
                messageContainer.innerHTML = '<p>Loading users...</p>';
                const res = await fetch('http://localhost:5000/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to load users');
                const users = await res.json();
                const tbody = document.querySelector('#usersTable tbody');
                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td><input value="${u.name || ''}" id="name-${u._id}" class="form-group-input"></td>
                        <td><input value="${u.email || ''}" id="email-${u._id}" class="form-group-input"></td>
                        <td><input value="${u.phone || ''}" id="phone-${u._id}" class="form-group-input"></td>
                        <td><input type="checkbox" ${u.isAdmin ? 'checked' : ''} id="admin-${u._id}"></td>
                        <td>
                            <button class="btn-update" onclick="updateUser('${u._id}')">Update</button>
                            <button class="btn-delete" onclick="deleteUser('${u._id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
                messageContainer.innerHTML = '';
            } catch (error) {
                console.error('Error loading users:', error);
                messageContainer.innerHTML = '<div class="error-message">Error loading users. Please try again.</div>';
            }
        }

        async function updateUser(id) {
            const data = {
                name: document.getElementById(`name-${id}`).value.trim(),
                email: document.getElementById(`email-${id}`).value.trim(),
                phone: document.getElementById(`phone-${id}`).value.trim(),
                isAdmin: document.getElementById(`admin-${id}`).checked
            };
            if (!data.name || !data.email) {
                alert('Name and email are required.');
                return;
            }
            try {
                const res = await fetch(`http://localhost:5000/api/admin/users/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('Failed to update user');
                loadUsers();
                messageContainer.innerHTML = '<div class="success-message">User updated successfully.</div>';
                setTimeout(() => messageContainer.innerHTML = '', 3000);
            } catch (error) {
                console.error('Error updating user:', error);
                messageContainer.innerHTML = '<div class="error-message">Error updating user. Please try again.</div>';
            }
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) return;
            try {
                const res = await fetch(`http://localhost:5000/api/admin/users/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to delete user');
                loadUsers();
                messageContainer.innerHTML = '<div class="success-message">User deleted successfully.</div>';
                setTimeout(() => messageContainer.innerHTML = '', 3000);
            } catch (error) {
                console.error('Error deleting user:', error);
                messageContainer.innerHTML = '<div class="error-message">Error deleting user. Please try again.</div>';
            }
        }

        loadUsers();
    </script>
</body>
</html>
